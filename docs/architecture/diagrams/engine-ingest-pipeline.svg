<text x="224.025" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;discover videos&lt;br/&gt;(channel/playlist/handle)&quot;</text>
<text x="610.625" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;fetch metadata&lt;br/&gt;videos.ingest_status&quot;</text>

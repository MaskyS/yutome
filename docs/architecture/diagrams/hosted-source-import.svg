<line x1="261" y1="400" x2="401" y2="400" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="331" y="394" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">enqueue discover_source job (priority 100)</text>
<line x1="261" y1="440" x2="99.625" y2="440" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="180.3125" y="434" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">imported sources + jobs + policies</text>
<rect x="30" y="30" width="139.25" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="99.625" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Dashboard / CLI</text>
<rect x="209.25" y="30" width="103.5" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="261" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Hosted API</text>
<rect x="356.4" y="30" width="89.2" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="401" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Postgres</text>
</svg>
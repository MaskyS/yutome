<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 477.05 460" width="477.05" height="460" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.4, 0 4.8" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line x1="70" y1="70" x2="70" y2="430" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="226.775" y1="70" x2="226.775" y2="430" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="395.3" y1="70" x2="395.3" y2="430" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<polyline points="70,90 100,90 100,110 70,110" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="106" y="100" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">generate code_verifier + code_challenge</text>
<line x1="70" y1="160" x2="226.775" y2="160" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="148.3875" y="154" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">open /cli/authorize (browser, dashboard session)</text>
<line x1="226.775" y1="200" x2="395.3" y2="200" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="311.0375" y="194" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">POST /account/cli/authorize {code_challenge, scopes}</text>
<line x1="395.3" y1="240" x2="226.775" y2="240" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="311.0375" y="234" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">authorization code (pending account_grant, kind=cli_install)</text>
<line x1="70" y1="280" x2="395.3" y2="280" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="232.65" y="274" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">POST /account/cli/token {code, code_verifier}</text>
<polyline points="395.3,320 425.3,320 425.3,340 395.3,340" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="431.3" y="330" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">verify PKCE, activate grant, sign CLI JWT</text>
<line x1="395.3" y1="390" x2="70" y2="390" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="232.65" y="384" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">access_token (JWT) + grant_id + expires_at</text>
<rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="70" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">CLI</text>
<rect x="150" y="30" width="153.55" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="226.775" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Web app (session)</text>
<rect x="343.55" y="30" width="103.5" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="395.3" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Hosted API</text>
</svg>
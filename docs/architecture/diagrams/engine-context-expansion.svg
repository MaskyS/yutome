<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 628.4000000000001 420" width="628.4000000000001" height="420" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.4, 0 4.8" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line x1="152.4" y1="70" x2="152.4" y2="390" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="356.675" y1="70" x2="356.675" y2="390" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="532.35" y1="70" x2="532.35" y2="390" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="152.4" y1="90" x2="356.675" y2="90" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="254.53750000000002" y="84" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">chunk_id, or video_id+time, or youtube_url</text>
<line x1="356.675" y1="130" x2="532.35" y2="130" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="444.51250000000005" y="124" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">_chunk_by_id / _chunk_by_video_time</text>
<line x1="532.35" y1="170" x2="356.675" y2="170" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="444.51250000000005" y="164" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">anchor chunk</text>
<line x1="152.4" y1="210" x2="532.35" y2="210" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="342.375" y="204" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">_neighbor_chunks(anchor, token_budget=3000)</text>
<polyline points="152.4,250 182.4,250 182.4,270 152.4,270" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="188.4" y="260" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">_merge_chunk_text (dedupe overlaps)</text>
<polyline points="152.4,320 182.4,320 182.4,340 152.4,340" fill="none" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="188.4" y="330" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">{anchor, chunks, merged text, citations}</text>
<rect x="30" y="214" width="244.8" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="268.8,214 274.8,220 268.8,220" fill="var(--_inner-stroke)" />
<text x="152.4" y="227.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">greedily add neighbours until budget hit</text>
<rect x="57.75" y="30" width="189.3" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="152.4" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">api.show(kind=context)</text>
<rect x="287.05" y="30" width="139.25" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="356.675" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">_resolve_anchor</text>
<rect x="466.3" y="30" width="132.10000000000002" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="532.35" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Postgres search store</text>
</svg>

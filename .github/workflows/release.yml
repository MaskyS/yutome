name: Release to PyPI

# Publishes the package to PyPI when a `v*` tag is pushed.
#
# Setup (one-time, in PyPI's web UI):
#   1. https://pypi.org/manage/account/publishing/
#   2. Add a new pending publisher for the project `yutome`:
#        Owner:           MaskyS
#        Repository name: yutome
#        Workflow name:   release.yml
#        Environment:     pypi
#
# Then to release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The workflow builds an sdist + wheel and uploads via PyPI's OIDC
# trusted publishing — no API token required.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Check distributions
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/yutome/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
